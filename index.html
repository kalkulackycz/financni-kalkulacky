<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bezplatná online hypoteční kalkulačka. Spočítejte si měsíční splátku, celkové úroky a získejte přehledný graf zdarma.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2BW708HYKH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2BW708HYKH');
    </script>
    <title>Hypoteční kalkulačka</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <nav class="menu">
        <a href="index.html" class="aktivni">Hypotéka</a>
        <a href="sporeni.html">Spoření</a>
        <a href="pujcka.html">Půjčka</a>
    </nav>

    <div class="kalkulacka">
        <h1>Hypoteční kalkulačka</h1>
        <label for="castka">Výše úvěru (Kč):</label>
        <input type="number" id="castka" value="3000000">
        <label for="urok">Úroková sazba (% ročně):</label>
        <input type="number" id="urok" value="5.5" step="0.1">
        <label for="doba">Doba splácení (roky):</label>
        <input type="number" id="doba" value="30">
        
        <button id="vypocitat">Vypočítat</button>

        <div class="scenare">
            <p>Rychlá simulace úroku:</p>
            <button onclick="nastavUrok(4.5)">Optimistické (4,5 %)</button>
            <button onclick="nastavUrok(5.5)">Reálné (5,5 %)</button>
            <button onclick="nastavUrok(6.5)">Pesimistické (6,5 %)</button>
        </div>

        <h2 id="vysledek"></h2>
        <div id="detaily"></div>
        <canvas id="graf"></canvas>

        <div class="info-box">
            <p><strong>Tip:</strong> Nevíte, kolik si můžete půjčit? Přečtěte si náš článek: <a href="kolik-pujcit-hypoteka.html">Kolik si můžu půjčit na hypotéku?</a></p>
        </div>
    </div>

    <footer>
        <p>Kalkulačky slouží pouze pro orientační výpočet a nenahrazují odborné finanční poradenství.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
