<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Kalkulačka půjčky</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <nav class="menu">
        <a href="index.html">Hypotéka</a>
        <a href="sporeni.html">Spoření</a>
        <a href="pujcka.html" class="aktivni">Půjčka</a>
    </nav>

    <div class="kalkulacka">
        <h1>Kalkulačka půjčky</h1>
        <label for="vysePujcky">Výše půjčky (Kč):</label>
        <input type="number" id="vysePujcky" value="100000">
        <label for="urokPujcka">Úroková sazba (% ročně):</label>
        <input type="number" id="urokPujcka" value="8.9" step="0.1">
        <label for="poplatek">Poplatek za sjednání (Kč):</label>
        <input type="number" id="poplatek" value="1500">
        <label for="dobaPujcka">Doba splácení (roky):</label>
        <input type="number" id="dobaPujcka" value="5">
        <button id="vypocitatPujcka">Vypočítat</button>
        <h2 id="vysledekPujcka"></h2>
        <div id="detailyPujcka" class="detaily"></div>
        <canvas id="grafPujcka" width="400" height="300"></canvas>
    </div>

    <script src="pujcka.js"></script>
</body>
</html>
