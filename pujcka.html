<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kalkulačka půjčky online zdarma. Spočítejte si měsíční splátku i celkovou cenu půjčky včetně poplatků.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2BW708HYKH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2BW708HYKH');
    </script>
    <title>Kalkulačka půjčky</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <nav class="menu">
        <a href="index.html">Hypotéka</a>
        <a href="sporeni.html">Spoření</a>
        <a href="pujcka.html" class="aktivni">Půjčka</a>
    </nav>

    <div class="kalkulacka">
        <h1>Kalkulačka půjčky</h1>
        <label for="vysePujcky">Výše půjčky (Kč):</label>
        <input type="number" id="vysePujcky" value="100000">
        <label for="urokPujcka">Úroková sazba (% ročně):</label>
        <input type="number" id="urokPujcka" value="8.9" step="0.1">
        <label for="poplatek">Poplatek za sjednání (Kč):</label>
        <input type="number" id="poplatek" value="1500">
        <label for="dobaPujcka">Doba splácení (roky):</label>
        <input type="number" id="dobaPujcka" value="5">
        <button id="vypocitatPujcka">Vypočítat</button>
        <h2 id="vysledekPujcka"></h2>
        <div id="detailyPujcka" class="detaily"></div>

        <a href="rpsn-vysvetlene.html" class="info-box">
            💡 Nevíš, co znamená RPSN? <span>Vysvětlíme ti to →</span>
        </a>

        <canvas id="grafPujcka" width="400" height="300"></canvas>
    </div>

    <footer class="paticka">
        <p>Kalkulačky slouží pouze pro orientační výpočet a nenahrazují odborné finanční poradenství.</p>
        </footer>

    <script src="pujcka.js"></script>
</body>
</html>
