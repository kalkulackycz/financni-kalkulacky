<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulačka spoření</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <nav class="menu">
        <a href="index.html">Hypotéka</a>
        <a href="sporeni.html" class="aktivni">Spoření</a>
        <a href="pujcka.html">Půjčka</a>
    </nav>

    <div class="kalkulacka">
        <h1>Kalkulačka spoření</h1>
        <label for="mesicniVklad">Měsíční vklad (Kč):</label>
        <input type="number" id="mesicniVklad" value="3000">
        <label for="urokSporeni">Roční úrok (%):</label>
        <input type="number" id="urokSporeni" value="4" step="0.1">
        <label for="dobaSporeni">Doba spoření (roky):</label>
        <input type="number" id="dobaSporeni" value="10">
        
        <button id="vypocitatSporeni">Vypočítat</button>

        <div class="scenare"></div>

        <h2 id="vysledekSporeni"></h2>
        <div id="detailySporeni"></div>
        <canvas id="graf"></canvas>
    </div>

    <script src="sporeni.js"></script>
</body>
</html>
