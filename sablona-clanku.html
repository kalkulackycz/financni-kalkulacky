<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Název článku – Šablona</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Kopíruje CSS strukturu z jak-se-pocita-cista-mzda-2026.html */
    </style>
</head>
<body>

    <div class="clanek-kontejner">

        <!-- ÚVODNÍ DISCLAIMER BOX -->
        <div class="info-blok-aktualnost">
            <!-- SEM VLOŽ ÚVODNÍ DISCLIMER -->
        </div>

        <!-- SEKCE S NADPISEM -->
        <h2><!-- SEM VLOŽ NADPIS SEKCE --></h2>
        <p><!-- SEM VLOŽ TEXT SEKCE --></p>

        <!-- TABULKA PARAMETRŮ/HODNOT -->
        <table>
            <thead>
                <tr>
                    <th><!-- ZÁHLAVÍ 1 --></th>
                    <th><!-- ZÁHLAVÍ 2 --></th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><!-- HODNOTA 1 --></td>
                    <td><!-- HODNOTA 2 --></td>
                </tr>
            </tbody>
        </table>

        <!-- BOX S MODELOVÝM PŘÍKLADEM -->
        <div class="priklad-blok">
            <h3><!-- NÁZEV PŘÍKLADU --></h3>
            <div class="priklad-vysledky">
                <!-- SEM VLOŽ ŘÁDKY PŘÍKLADU -->
            </div>
        </div>

        <!-- SROVNÁVACÍ BOXY VEDLE SEBE -->
        <div class="srovnani-blok">
            <div class="srovnani-karta">
                <!-- KARTA 1 -->
            </div>
            <div class="srovnani-karta">
                <!-- KARTA 2 -->
            </div>
        </div>

        <!-- CHECKLIST SEKCE -->
        <div class="checklist-blok">
            <h3><!-- NÁZEV CHECKLISTU --></h3>
            <div class="checklist-polozka">
                <span class="check">✓</span>
                <!-- POLOŽKA CHECKLISTU -->
            </div>
        </div>

        <!-- BOX DALŠÍ UŽITEČNÉ PRŮVODCE / CTA -->
        <div class="cta-blok">
            <h3><!-- NÁZEV CTA --></h3>
            <p><!-- TEXT CTA --></p>
            <a href="#" class="cta-tlacitko"><!-- TEXT TLAČÍTKA --></a>
        </div>

        <!-- ZÁVĚREČNÝ PRÁVNÍ DISCLAIMER -->
        <div class="info-blok">
            <p><!-- SEM VLOŽ ZÁVĚREČNÝ PRÁVNÍ DISCLAIMER --></p>
        </div>

        <!-- ZPĚT -->
        <a href="#" class="zpet-odkaz">← Zpět</a>

    </div>

</body>
</html>
